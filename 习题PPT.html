<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java面向对象程序设计复习</title>
    <style>
        /* ===========================================
           CSS CUSTOM PROPERTIES (THEME)
           =========================================== */
        :root {
            --stage-bg: #10151f;
            --slide-bg: #f5f1e8;
            --ink: #17202a;
            --muted: #5d6673;
            --paper: #fffaf0;
            --line: #d8cdbb;
            --green: #1d7a68;
            --red: #b34f38;
            --gold: #c69035;
            --blue: #244d75;
            --shadow: rgba(28, 34, 42, 0.1);
            --font-display: "Noto Serif SC", "Songti SC", "STSong", "SimSun", serif;
            --font-mono: "JetBrains Mono", "SFMono-Regular", "Consolas", monospace;
            --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
            --duration-normal: 0.55s;
        }

        /* ===========================================
           BASE STYLES
           =========================================== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ===========================================
           FIXED 16:9 STAGE: MANDATORY BASE STYLES
           Include this ENTIRE file in every presentation.
           Slides are authored at 1920x1080 and scaled as a whole.
           =========================================== */

        /* 1. Lock the browser viewport */
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--stage-bg, #000);
        }

        /* 2. Full-window deck viewport */
        .deck-viewport {
            position: fixed;
            inset: 0;
            overflow: hidden;
            background: var(--stage-bg, #000);
        }

        /* 3. Fixed 16:9 design canvas.
           JavaScript sets transform: translate(...) scale(...). */
        .deck-stage {
            position: absolute;
            left: 0;
            top: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            transform-origin: 0 0;
            background: var(--slide-bg, #fff);
        }

        /* 4. Slides stack inside the fixed stage.
           Content must be laid out at 1920x1080, not reflowed per device. */
        .slide {
            position: absolute;
            inset: 0;
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            display: block;
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            background: var(--slide-bg, #fff);
        }

        .slide.active,
        .slide.visible {
            visibility: visible;
            opacity: 1;
            pointer-events: auto;
            z-index: 1;
        }

        /* 5. Keep media inside authored slide bounds */
        img,
        video,
        canvas,
        svg {
            max-width: 100%;
            max-height: 100%;
        }

        /* 6. Presentation chrome stays outside the slide design system */
        .deck-controls {
            position: fixed;
            left: 50%;
            bottom: 22px;
            transform: translateX(-50%);
            z-index: 1000;
        }

        /* 7. Print one fixed-size slide per page */
        @media print {
            html,
            body {
                width: 1920px;
                height: auto;
                overflow: visible;
                background: #fff;
            }

            .deck-viewport {
                position: static;
                overflow: visible;
                background: #fff;
            }

            .deck-stage {
                position: static;
                width: auto;
                height: auto;
                transform: none !important;
                background: none;
            }

            .slide {
                position: relative;
                display: block !important;
                visibility: visible !important;
                opacity: 1 !important;
                pointer-events: auto !important;
                width: 1920px;
                height: 1080px;
                break-after: page;
                page-break-after: always;
            }

            .slide:last-child {
                break-after: auto;
                page-break-after: auto;
            }

            .deck-controls,
            .question-timer {
                display: none !important;
            }
        }

        /* 8. Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.2s !important;
            }
        }

        /* ===========================================
           SLIDE SURFACE
           =========================================== */
        body { color: var(--ink); font-family: var(--font-display); }
        .slide {
            background:
                linear-gradient(90deg, rgba(36, 77, 117, 0.035) 1px, transparent 1px),
                linear-gradient(rgba(36, 77, 117, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 88% 18%, rgba(198, 144, 53, 0.14), transparent 260px),
                radial-gradient(circle at 12% 84%, rgba(29, 122, 104, 0.1), transparent 280px),
                var(--slide-bg);
            background-size: 40px 40px, 40px 40px, auto, auto, auto;
        }
        .slide::before {
            content: "";
            position: absolute;
            inset: 44px;
            border: 2px solid rgba(23, 32, 42, 0.13);
            pointer-events: none;
        }
        .slide::after {
            content: "JAVA OOP";
            position: absolute;
            right: -55px;
            bottom: 104px;
            color: rgba(23, 32, 42, 0.08);
            font-family: var(--font-mono);
            font-size: 46px;
            font-weight: 700;
            letter-spacing: 0;
            transform: rotate(-90deg);
        }
        .sheet {
            position: absolute;
            inset: 68px 104px 54px 104px;
            display: grid;
            grid-template-rows: 96px 1fr 38px;
            gap: 18px;
        }
        .topbar {
            display: grid;
            grid-template-columns: 205px 1fr 220px;
            align-items: end;
            gap: 28px;
            border-bottom: 4px double rgba(23, 32, 42, 0.26);
            padding-bottom: 16px;
        }
        .badge {
            width: 172px;
            height: 64px;
            display: grid;
            place-items: center;
            background: var(--ink);
            color: #fff7e9;
            font-family: var(--font-mono);
            font-size: 25px;
            font-weight: 700;
            box-shadow: 7px 7px 0 rgba(179, 79, 56, 0.16);
        }
        .topic {
            color: var(--green);
            font-size: 29px;
            font-weight: 900;
            line-height: 1.1;
        }
        .meta {
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 17px;
            text-align: right;
            line-height: 1.45;
        }
        .brand-meta {
            display: grid;
            justify-items: end;
            align-content: end;
            gap: 6px;
            min-width: 0;
        }
        .school-logo {
            width: 176px;
            max-height: 38px;
            object-fit: contain;
            opacity: 0.92;
            filter: brightness(0) saturate(100%) invert(32%) sepia(26%) saturate(1118%) hue-rotate(124deg) brightness(91%) contrast(88%);
        }
        .body {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 520px;
            gap: 34px;
            min-height: 0;
        }
        .prompt {
            background: rgba(255, 250, 240, 0.9);
            border: 1px solid var(--line);
            box-shadow: 0 16px 32px var(--shadow);
            padding: 26px 34px;
            min-height: 0;
        }
        .prompt h1 {
            color: var(--ink);
            font-size: 38px;
            line-height: 1.22;
            letter-spacing: 0;
            margin-bottom: 18px;
        }
        .question-text {
            color: #25303c;
            font-size: 27px;
            line-height: 1.42;
            white-space: pre-line;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-top: 16px;
        }
        .option {
            min-height: 72px;
            border: 1px solid rgba(23, 32, 42, 0.18);
            background: rgba(245, 241, 232, 0.84);
            padding: 18px 20px;
            color: #25303c;
            font-size: 24px;
            line-height: 1.28;
        }
        .code-shell {
            margin-top: 24px;
            background: #111923;
            color: #f5f1e8;
            border-left: 9px solid var(--green);
            display: grid;
            grid-template-rows: 44px minmax(0, 1fr);
            font-family: var(--font-mono);
            font-size: 15.5px;
            line-height: 1.22;
            max-height: 642px;
            overflow: hidden;
        }
        .code-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            min-height: 44px;
            padding: 0 18px;
            border-bottom: 1px solid rgba(255, 250, 240, 0.14);
            background: rgba(255, 250, 240, 0.04);
        }
        .code-label {
            color: rgba(255, 250, 240, 0.7);
            font-size: 13px;
            font-weight: 700;
        }
        .code-full-btn, .code-close-btn {
            border: 1px solid rgba(255, 250, 240, 0.24);
            background: rgba(255, 250, 240, 0.08);
            color: #fffaf0;
            font-family: var(--font-mono);
            font-size: 13px;
            padding: 6px 10px;
            cursor: pointer;
        }
        .code-listing {
            overflow: hidden;
            padding: 16px 0;
            tab-size: 4;
        }
        .code-line {
            display: grid;
            grid-template-columns: 48px minmax(0, 1fr);
            column-gap: 16px;
            min-height: 19px;
            padding: 0 18px 0 0;
        }
        .line-number {
            color: rgba(255, 250, 240, 0.34);
            text-align: right;
            user-select: none;
            -webkit-user-select: none;
        }
        .code-text {
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }
        .kw { color: #7bdff2; font-weight: 700; }
        .type { color: #f7d774; }
        .str { color: #9be28f; }
        .num { color: #ffb86c; }
        .comment { color: #8291a7; font-style: italic; }
        .program .code-shell { font-size: 15.5px; line-height: 1.22; max-height: 642px; }
        .talk-slide .sheet {
            grid-template-rows: 96px 1fr 38px;
        }
        .talk-body {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 42px;
            min-height: 0;
        }
        .talk-main, .talk-side {
            background: rgba(255, 250, 240, 0.82);
            border: 1px solid rgba(23, 32, 42, 0.17);
            box-shadow: 0 16px 32px var(--shadow);
            padding: 34px 42px;
            min-height: 0;
        }
        .talk-main h1 {
            color: var(--ink);
            font-size: 54px;
            line-height: 1.16;
            margin-bottom: 26px;
        }
        .talk-main p, .talk-main li,
        .talk-side p, .talk-side li {
            color: #25303c;
            font-size: 29px;
            line-height: 1.46;
        }
        .talk-main ul, .talk-side ul {
            display: grid;
            gap: 16px;
            padding-left: 34px;
        }
        .talk-side-title {
            color: var(--red);
            font-family: var(--font-mono);
            font-size: 19px;
            font-weight: 700;
            margin-bottom: 18px;
        }
        .route-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-top: 18px;
        }
        .route-item {
            border: 1px solid rgba(23, 32, 42, 0.16);
            background: rgba(245, 241, 232, 0.72);
            padding: 18px 20px;
        }
        .route-kicker {
            color: var(--green);
            font-family: var(--font-mono);
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .route-title {
            color: var(--ink);
            font-size: 27px;
            font-weight: 900;
            line-height: 1.24;
        }
        .section-slide .talk-main h1 {
            font-size: 62px;
        }
        .score-list {
            display: grid;
            gap: 14px;
        }
        .score-row {
            display: grid;
            grid-template-columns: 112px 1fr;
            gap: 18px;
            align-items: start;
            border-bottom: 1px solid rgba(23, 32, 42, 0.12);
            padding-bottom: 12px;
        }
        .score-points {
            color: var(--blue);
            font-family: var(--font-mono);
            font-size: 24px;
            font-weight: 700;
        }
        .score-text {
            color: #25303c;
            font-size: 27px;
            line-height: 1.38;
        }
        .side {
            display: grid;
            grid-template-rows: 1fr 148px;
            gap: 24px;
            min-height: 0;
        }
        .note, .answer-card {
            background: rgba(255, 250, 240, 0.72);
            border: 1px solid rgba(23, 32, 42, 0.17);
            box-shadow: 0 12px 24px rgba(28, 34, 42, 0.055);
            padding: 24px;
            min-height: 0;
        }
        .note-label {
            color: var(--red);
            font-family: var(--font-mono);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
        }
        .hint-button {
            min-height: 46px;
            border: 1px solid rgba(36, 77, 117, 0.26);
            background: rgba(36, 77, 117, 0.08);
            color: var(--blue);
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            padding: 0 16px;
            margin-bottom: 16px;
        }
        .hint-button:hover {
            background: rgba(36, 77, 117, 0.14);
        }
        .note p {
            color: #364250;
            font-size: 22px;
            line-height: 1.48;
            white-space: pre-line;
        }
        .answer-card {
            display: grid;
            align-content: center;
            gap: 14px;
        }
        .answer-card p {
            color: var(--muted);
            font-size: 18px;
            line-height: 1.35;
        }
        .answer-button {
            width: 100%;
            min-height: 58px;
            border: 1px solid rgba(36, 77, 117, 0.3);
            background: var(--blue);
            color: #fffaf0;
            font-family: var(--font-display);
            font-size: 26px;
            font-weight: 900;
            cursor: pointer;
            text-align: left;
            padding: 0 18px;
        }
        .answer-button::before {
            content: "+";
            display: inline-grid;
            place-items: center;
            width: 30px;
            height: 30px;
            margin-right: 12px;
            color: var(--blue);
            background: #fffaf0;
            font-family: var(--font-mono);
            font-size: 22px;
            vertical-align: 2px;
        }
        .footer {
            display: grid;
            grid-template-columns: 1fr;
            align-items: center;
            gap: 24px;
        }
        .page-no {
            color: var(--muted);
            font-family: var(--font-mono);
            font-size: 19px;
            text-align: right;
        }

        /* ===========================================
           ANIMATIONS
           =========================================== */
        .reveal {
            opacity: 0;
            transform: translateY(24px);
            transition: opacity var(--duration-normal) var(--ease-out-expo),
                        transform var(--duration-normal) var(--ease-out-expo);
        }
        .slide.visible .reveal {
            opacity: 1;
            transform: translateY(0);
        }
        .slide.visible .reveal:nth-child(1) { transition-delay: 0.08s; }
        .slide.visible .reveal:nth-child(2) { transition-delay: 0.15s; }
        .slide.visible .reveal:nth-child(3) { transition-delay: 0.22s; }

        /* ===========================================
           PRESENTATION CHROME
           =========================================== */
        .deck-controls {
            display: flex;
            align-items: center;
            gap: 14px;
            color: #f5f1e8;
            font-family: var(--font-mono);
            font-size: 15px;
            background: rgba(16, 21, 31, 0.78);
            border: 1px solid rgba(255, 250, 240, 0.22);
            padding: 10px 14px;
            backdrop-filter: blur(10px);
            opacity: 0.28;
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        .deck-controls:hover,
        .deck-controls:focus-within {
            opacity: 1;
            transform: translateX(-50%) translateY(-4px);
        }
        .deck-controls button, .edit-toggle {
            border: 1px solid rgba(255, 250, 240, 0.28);
            color: #fffaf0;
            background: rgba(255, 250, 240, 0.08);
            font-family: var(--font-mono);
            padding: 7px 11px;
            cursor: pointer;
        }
        .code-overlay {
            position: fixed;
            inset: 0;
            z-index: 20000;
            display: none;
            background: #0c121a;
            color: #fffaf0;
            font-family: var(--font-mono);
            padding: 42px;
        }
        .code-overlay.open {
            display: grid;
        }
        .code-overlay-panel {
            width: 100%;
            height: 100%;
            min-height: 0;
            display: grid;
            grid-template-rows: 72px minmax(0, 1fr);
            background: #0c121a;
            border: 1px solid rgba(255, 250, 240, 0.18);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.34);
        }
        .code-overlay-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            border-bottom: 1px solid rgba(255, 250, 240, 0.18);
            background: rgba(255, 250, 240, 0.04);
        }
        .code-overlay-title {
            color: rgba(255, 250, 240, 0.82);
            font-weight: 700;
        }
        .code-overlay .code-listing {
            overflow: auto;
            padding: 28px 0;
            font-size: 24px;
            line-height: 1.38;
        }
        .code-overlay .code-line {
            grid-template-columns: 72px minmax(0, 1fr);
            padding-right: 34px;
        }
        .answer-overlay {
            position: fixed;
            inset: 0;
            z-index: 19000;
            display: none;
            place-items: center;
            background: rgba(16, 21, 31, 0.72);
            backdrop-filter: blur(10px);
        }
        .answer-overlay.open {
            display: grid;
        }
        .question-timer {
            position: fixed;
            right: 22px;
            bottom: 22px;
            z-index: 21000;
            display: none;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            color: #fffaf0;
            background: rgba(16, 21, 31, 0.7);
            border: 1px solid rgba(255, 250, 240, 0.2);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
            font-family: var(--font-mono);
            backdrop-filter: blur(8px);
        }
        .question-timer.show {
            display: inline-flex;
        }
        .question-timer-label {
            color: rgba(255, 250, 240, 0.72);
            font-size: 14px;
        }
        .question-timer-time {
            min-width: 66px;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
        }
        .question-timer button {
            min-width: 46px;
            min-height: 32px;
            border: 1px solid rgba(255, 250, 240, 0.24);
            color: #fffaf0;
            background: rgba(255, 250, 240, 0.08);
            font-family: var(--font-mono);
            cursor: pointer;
            padding: 4px 8px;
        }
        .question-timer button:hover {
            background: rgba(255, 250, 240, 0.16);
        }
        .answer-panel {
            width: min(1320px, calc(100vw - 96px));
            max-height: min(820px, calc(100vh - 96px));
            display: grid;
            grid-template-rows: 78px minmax(0, 1fr);
            background:
                linear-gradient(90deg, rgba(36, 77, 117, 0.04) 1px, transparent 1px),
                linear-gradient(rgba(36, 77, 117, 0.035) 1px, transparent 1px),
                #fffaf0;
            background-size: 34px 34px;
            border: 1px solid rgba(23, 32, 42, 0.2);
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.28);
        }
        .answer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding: 0 30px;
            border-bottom: 3px double rgba(23, 32, 42, 0.2);
        }
        .answer-title {
            color: var(--blue);
            font-size: 30px;
            font-weight: 900;
        }
        .answer-close-btn {
            border: 1px solid rgba(36, 77, 117, 0.28);
            background: var(--blue);
            color: #fffaf0;
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 900;
            padding: 10px 18px;
            cursor: pointer;
        }
        .answer-body {
            overflow: auto;
            padding: 24px 40px 36px;
            color: #25303c;
            font-size: 30px;
            line-height: 1.55;
            white-space: pre-line;
        }
        .answer-body .answer-text-block {
            white-space: pre-line;
            margin-bottom: 10px;
        }
        .answer-body .answer-code-shell {
            margin: 8px 0 18px;
            background: #111923;
            border-left: 9px solid var(--green);
            color: #f5f1e8;
            font-family: var(--font-mono);
            font-size: 17px;
            line-height: 1.08;
        }
        .answer-body .answer-code-shell .code-toolbar {
            min-height: 38px;
        }
        .answer-body .answer-code-shell .code-listing {
            max-height: none;
            overflow: visible;
            padding: 8px 0 10px;
        }
        .answer-body .answer-code-shell .code-line {
            grid-template-columns: 50px minmax(0, 1fr);
            min-height: 18px;
            padding-right: 20px;
        }
        .answer-body code {
            font-family: var(--font-mono);
            font-size: 25px;
        }
        .edit-hotzone {
            position: fixed;
            top: 0;
            left: 0;
            width: 80px;
            height: 80px;
            z-index: 10000;
            cursor: pointer;
        }
        .edit-toggle {
            position: fixed;
            top: 18px;
            left: 18px;
            z-index: 10001;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .edit-toggle.show, .edit-toggle.active {
            opacity: 1;
            pointer-events: auto;
        }
        .editing [data-editable="true"] {
            outline: 2px dashed rgba(179, 79, 56, 0.75);
            outline-offset: 5px;
        }
    </style>
</head>
<body>
    <div class="deck-viewport">
        <main class="deck-stage" id="deckStage"></main>
    </div>
    <div class="deck-controls">
        <button id="prevBtn" title="上一页">上一页</button>
        <span id="counter">1 / 41</span>
        <button id="nextBtn" title="下一页">下一页</button>
        <button id="deckFullscreenBtn" title="全屏播放">全屏</button>
    </div>
    <div class="question-timer" id="questionTimer" aria-live="polite">
        <span class="question-timer-label">本题用时</span>
        <span class="question-timer-time" id="questionTimerTime">00:00</span>
        <button id="questionTimerPause" type="button">暂停</button>
        <button id="questionTimerReset" type="button">归零</button>
    </div>
    <div class="code-overlay" id="codeOverlay" aria-hidden="true" onclick="closeCodeFullscreen()">
        <div class="code-overlay-panel" onclick="event.stopPropagation()">
            <div class="code-overlay-header">
                <div class="code-overlay-title" id="codeOverlayTitle">程序代码</div>
                <button class="code-close-btn" id="codeCloseBtn" type="button" onclick="closeCodeFullscreen()">退出全屏</button>

        /* ===========================================

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function highlightJavaLine(line) {
            const keywords = "abstract|boolean|break|catch|char|class|double|else|extends|final|finally|for|if|implements|import|int|interface|new|null|private|protected|public|return|static|String|super|this|throw|try|void|while";
            const types = "ArrayDeque|ArrayList|Box|Child|Course|EmailNotice|EmailNotifier|Exception|File|FileOutputStream|Figure|Integer|List|Math|Notice|Notifier|NumberFormatException|OutputStream|Parent|PrintWriter|Queue|SmsNotifier|StringBuilder|System|Test|TestExt|Thread|Worker";
            const tokenPattern = new RegExp(`\\b(${keywords})\\b|\\b(${types})\\b|\\b(\\d+(?:\\.\\d+)?)\\b`, "g");
            const highlightPlain = value => escapeHtml(value).replace(tokenPattern, (match, kw, type, num) => {
                if (kw) return `<span class="kw">${match}</span>`;
                if (type) return `<span class="type">${match}</span>`;
                if (num) return `<span class="num">${match}</span>`;
                return match;
            });

            let html = "";
            let buffer = "";
            let i = 0;
            while (i < line.length) {
                if (line[i] === "/" && line[i + 1] === "/") {
                    html += highlightPlain(buffer);
                    html += `<span class="comment">${escapeHtml(line.slice(i))}</span>`;
                    return html;
                }
                if (line[i] === "\"") {
                    html += highlightPlain(buffer);
                    buffer = "";
                    let j = i + 1;
                    while (j < line.length) {
                        if (line[j] === "\\" && j + 1 < line.length) {
                            j += 2;
                            continue;
                        }
                        if (line[j] === "\"") {
                            j++;
                            break;
                        }
                        j++;
                    }
                    html += `<span class="str">${escapeHtml(line.slice(i, j))}</span>`;
                    i = j;
                    continue;
                }
                buffer += line[i];
                i++;
            }
            return html + highlightPlain(buffer);
        }

        function renderCodeListing(code) {
            return String(code).split("\n").map((line, index) => `
                <div class="code-line">
                    <span class="line-number" aria-hidden="true">${index + 1}</span>
                    <code class="code-text">${highlightJavaLine(line)}</code>
                </div>
            `).join("");
        }

        function renderCodeBlock(q, index) {
            if (!q.code) return "";
            const codeId = `code-${index}`;
            return `
                <div class="code-shell" data-code-id="${codeId}">
                    <div class="code-toolbar">
                        <span class="code-label">程序代码</span>
                        <button class="code-full-btn" type="button" data-code-id="${codeId}" onclick="openCodeFullscreen('${codeId}')">代码全屏</button>
                    </div>
                    <div class="code-listing" data-code-body="${codeId}" data-raw-code="${escapeHtml(q.code)}">${renderCodeListing(q.code)}</div>
                </div>
            `;
        }

        function looksLikeJavaCodeLine(line) {
            const trimmed = line.trim();
            if (!trimmed) return false;
            return /^(import|class|interface|public|private|protected|abstract|static|void|int|double|boolean|String|List<|Map<|Set<|for\s*\(|if\s*\(|while\s*\(|try\s*\{|catch\s*\(|return|throw|new\s+)/.test(trimmed)
                || /[{};]$/.test(trimmed)
                || /\bextends\b|\bimplements\b|\bArrayList\b|\bSystem\.out\b/.test(trimmed);
        }

        function compactAnswerCode(code) {
            const lines = String(code).trim().split("\n");
            const compacted = [];
            lines.forEach((line, index) => {
                const trimmed = line.trim();
                if (trimmed) {
                    compacted.push(line);
                    return;
                }
                const previous = lines[index - 1]?.trim() || "";
                const next = lines[index + 1]?.trim() || "";
                const keepBetweenClasses = previous === "}" && /^(class|public class|abstract class|interface)\b/.test(next);
                const lastKeptBlank = compacted[compacted.length - 1]?.trim() === "";
                if (keepBetweenClasses && !lastKeptBlank) compacted.push("");
            });
            return compacted.join("\n");
        }

        function renderAnswerContent(answer) {
            const fullAnswer = String(answer);
            const fullCodeMatch = fullAnswer.match(/^(参考答案：)\n([\s\S]*\b(class|interface|import)\b[\s\S]*)$/);
            if (fullCodeMatch) {
                return `
                    <div class="answer-text-block">${escapeHtml(fullCodeMatch[1])}</div>
                    <div class="answer-code-shell">
                        <div class="code-toolbar"><span class="code-label">参考代码</span></div>
                        <div class="code-listing">${renderCodeListing(compactAnswerCode(fullCodeMatch[2]))}</div>
                    </div>
                `;
            }
            const fillAnswerMatch = fullAnswer.match(/^(依次填写：)\n([\s\S]*?)\n(解析：[\s\S]*)$/);
            if (fillAnswerMatch) {
                return `
                    <div class="answer-text-block">${escapeHtml(fillAnswerMatch[1])}</div>
                    <div class="answer-code-shell">
                        <div class="code-toolbar"><span class="code-label">参考代码</span></div>
                        <div class="code-listing">${renderCodeListing(fillAnswerMatch[2].trim())}</div>
                    </div>
                    <div class="answer-text-block">${escapeHtml(fillAnswerMatch[3])}</div>
                `;
            }
            const lines = String(answer).split("\n");
            const chunks = [];
            let textBuffer = [];
            let codeBuffer = [];

            const flushText = () => {
                if (textBuffer.length) {
                    chunks.push({ type: "text", value: textBuffer.join("\n").trim() });
                    textBuffer = [];
                }
            };
            const flushCode = () => {
                if (codeBuffer.length) {
                    chunks.push({ type: "code", value: codeBuffer.join("\n").trim() });
                    codeBuffer = [];
                }
            };

            lines.forEach(line => {
                if (looksLikeJavaCodeLine(line)) {
                    flushText();
                    codeBuffer.push(line);
                } else {
                    flushCode();
                    textBuffer.push(line);
                }
            });
            flushText();
            flushCode();

            return chunks.map(chunk => {
                if (!chunk.value) return "";
                if (chunk.type === "code") {
                    return `
                        <div class="answer-code-shell">
                            <div class="code-toolbar"><span class="code-label">参考代码</span></div>
                            <div class="code-listing">${renderCodeListing(compactAnswerCode(chunk.value))}</div>
                        </div>
                    `;
                }
                return `<div class="answer-text-block">${escapeHtml(chunk.value)}</div>`;
            }).join("");
        }

            const routeItems = slide.body.map(item => `
                <div class="route-item">

                    <div class="route-title">${escapeHtml(item.title)}</div>

            `).join("");

                <section class="slide talk-slide${index === 0 ? " active visible" : ""}">

                        <header class="topbar reveal">

                            <div class="page-no">${index + 1} / ${deckSlides.length}</div>
                        </footer>
                    </div>
                </section>
            `;
        }

        function renderSectionSlide(slide, index) {

        function renderScoreSlide(slide, index) {

                    <div class="score-text">${escapeHtml(row[1])}</div>
                </div>
            `).join("");

                <section class="slide talk-slide${index === 0 ? " active visible" : ""}">

                        <header class="topbar reveal">
                            <div class="badge">${escapeHtml(slide.badge)}</div>
                            <div><div class="topic" data-editable="true">${escapeHtml(slide.topic)}</div></div>
                            <div class="brand-meta">
                                <div class="meta">得分点<br>Java OOP</div>
                            </div>
                        </header>
                        <div class="talk-body reveal">
                            <article class="talk-main">
                                <h1 data-editable="true">${escapeHtml(slide.title)}</h1>
                                <div class="score-list" data-editable="true">${rows}</div>
                            </article>
                            <aside class="talk-side">
                                <div class="talk-side-title">${escapeHtml(slide.sideTitle)}</div>
                                <div data-editable="true">${renderList(slide.side)}</div>
                            </aside>
                        </div>
                        <footer class="footer reveal">
                            <div class="page-no">${index + 1} / ${deckSlides.length}</div>
                        </footer>
                    </div>
                </section>
            `;
        }

        function displayQuestionTitle(title) {
            const match = title.match(/^Q\d+/);
            return match ? match[0] : title;
        }

        function renderQuestion(q, index) {
            const options = q.options ? `<div class="options">${q.options.map(option => `<div class="option">${escapeHtml(option)}</div>`).join("")}</div>` : "";
            const code = renderCodeBlock(q, index);
            const programClass = q.type === "程序设计题" ? " program" : "";
            return `
                <section class="slide question-slide${index === 0 ? " active visible" : ""}">
                    <div class="sheet">
                        <header class="topbar reveal">
                            <div class="badge">${String(index + 1).padStart(2, "0")}</div>
                            <div>
                                <div class="topic" data-editable="true">${escapeHtml(q.topic)}</div>
                            </div>
                            <div class="brand-meta">
                                <div class="meta">${escapeHtml(q.type)}<br>Java OOP</div>
                            </div>
                        </header>
                        <div class="body reveal">
                            <article class="prompt${programClass}">
                                <h1 data-editable="true">${escapeHtml(displayQuestionTitle(q.title))}</h1>
                                <div class="question-text" data-editable="true">${escapeHtml(q.text)}</div>
                                ${options}
                                ${code}
                            </article>
                            <aside class="side">
                                <section class="note">
                                    <div class="note-label">考核提示</div>
                                    <button class="hint-button" type="button" aria-expanded="false" onclick="toggleHint(this)">查看提示</button>
                                    <p data-editable="true" data-hint-content hidden>${escapeHtml(q.note)}</p>
                                </section>
                                <section class="answer-card">
                                    <button class="answer-button" type="button" onclick="openAnswerOverlay(${q.questionIndex})">查看答案</button>
                                    <p>先独立作答，再对照答案和解析。</p>
                                </section>
                            </aside>
                        </div>
                        <footer class="footer reveal">
                            <div class="page-no">${index + 1} / ${deckSlides.length}</div>
                        </footer>
                    </div>
                </section>
            `;
        }

        function toggleHint(button) {
            const note = button.closest(".note");
            const content = note?.querySelector("[data-hint-content]");
            if (!content) return;
            const shouldShow = content.hasAttribute("hidden");
            if (shouldShow) {
                content.removeAttribute("hidden");
                button.textContent = "隐藏提示";
                button.setAttribute("aria-expanded", "true");
            } else {
                content.setAttribute("hidden", "");
                button.textContent = "查看提示";
                button.setAttribute("aria-expanded", "false");
            }
        }

        function renderSlide(slide, index) {
            if (slide.kind === "route") return renderRouteSlide(slide, index);
            if (slide.kind === "section") return renderSectionSlide(slide, index);
            if (slide.kind === "score") return renderScoreSlide(slide, index);
            if (slide.kind === "talk") return renderTalkSlide(slide, index);
            return renderQuestion(slide, index);
        }

        document.getElementById("deckStage").innerHTML = deckSlides.map(renderSlide).join("");

        function openCodeFullscreen(codeId) {
            const overlay = document.getElementById("codeOverlay");
            const overlayBody = document.getElementById("codeOverlayBody");
            const overlayTitle = document.getElementById("codeOverlayTitle");
            const body = document.querySelector(`[data-code-body="${codeId}"]`);
            if (!body) return;
            overlayTitle.textContent = document.querySelector(".slide.active h1")?.textContent || "程序代码";
            overlayBody.innerHTML = body.innerHTML;
            overlay.classList.add("open");
            overlay.setAttribute("aria-hidden", "false");
        }

        async function closeCodeFullscreen() {
            const overlay = document.getElementById("codeOverlay");
            const overlayBody = document.getElementById("codeOverlayBody");
            overlay.classList.remove("open");
            overlay.setAttribute("aria-hidden", "true");
            overlayBody.innerHTML = "";
            if (document.fullscreenElement === overlay) await document.exitFullscreen?.();
        }

        window.openCodeFullscreen = openCodeFullscreen;
        window.closeCodeFullscreen = closeCodeFullscreen;
        window.toggleHint = toggleHint;

        function openAnswerOverlay(index) {
            const overlay = document.getElementById("answerOverlay");
            const title = document.getElementById("answerOverlayTitle");
            const body = document.getElementById("answerOverlayBody");
            const question = questions[index];
            if (!question) return;
            title.textContent = `${displayQuestionTitle(question.title)} 参考答案`;
            body.innerHTML = renderAnswerContent(question.answer);
            overlay.classList.add("open");
            overlay.setAttribute("aria-hidden", "false");
        }

        function closeAnswerOverlay() {
            const overlay = document.getElementById("answerOverlay");
            const body = document.getElementById("answerOverlayBody");
            overlay.classList.remove("open");
            overlay.setAttribute("aria-hidden", "true");
            body.innerHTML = "";
        }

        window.openAnswerOverlay = openAnswerOverlay;
        window.closeAnswerOverlay = closeAnswerOverlay;

        class QuestionTimer {
            constructor() {
                this.root = document.getElementById("questionTimer");
                this.timeEl = document.getElementById("questionTimerTime");
                this.pauseButton = document.getElementById("questionTimerPause");
                this.resetButton = document.getElementById("questionTimerReset");
                this.activeSlide = null;
                this.baseElapsed = 0;
                this.startedAt = 0;
                this.intervalId = null;
                this.running = false;
                this.pauseButton.addEventListener("click", () => this.togglePause());
                this.resetButton.addEventListener("click", () => this.reset());
                this.render();
            }

            sync(slide) {
                const isQuestion = slide?.classList.contains("question-slide");
                this.root.classList.toggle("show", Boolean(isQuestion));
                if (!isQuestion) {
                    this.stop();
                    this.activeSlide = null;
                    return;
                }
                if (slide !== this.activeSlide) {
                    this.activeSlide = slide;
                    this.baseElapsed = 0;
                    this.startedAt = Date.now();
                    this.start();
                    this.render();
                }
            }

            elapsed() {
                if (!this.running) return this.baseElapsed;
                return this.baseElapsed + Date.now() - this.startedAt;
            }

            start() {
                if (this.running) return;
                this.running = true;
                this.startedAt = Date.now();
                this.intervalId = window.setInterval(() => this.render(), 250);
                this.pauseButton.textContent = "暂停";
            }

            stop() {
                if (this.running) {
                    this.baseElapsed = this.elapsed();
                }
                this.running = false;
                window.clearInterval(this.intervalId);
                this.intervalId = null;
                this.pauseButton.textContent = "继续";
                this.render();
            }

            togglePause() {
                if (!this.activeSlide) return;
                this.running ? this.stop() : this.start();
            }

            reset() {
                this.baseElapsed = 0;
                this.startedAt = Date.now();
                this.render();
            }

            render() {
                const totalSeconds = Math.floor(this.elapsed() / 1000);
                const minutes = String(Math.floor(totalSeconds / 60)).padStart(2, "0");
                const seconds = String(totalSeconds % 60).padStart(2, "0");
                this.timeEl.textContent = `${minutes}:${seconds}`;
            }
        }

        /* ===========================================
           SLIDE PRESENTATION CONTROLLER
           =========================================== */
        class SlidePresentation {
            constructor() {
                this.slides = Array.from(document.querySelectorAll(".slide"));
                this.currentSlide = 0;
                this.stage = document.getElementById("deckStage");
                this.counter = document.getElementById("counter");
                this.slideKey = "java-oop-review-course-current-slide-v2";
                this.setupStageScale();
                this.setupKeyboardNav();
                this.setupTouchNav();
                this.setupWheelNav();
                this.setupButtons();
                this.setupDeckFullscreen();
                this.setupCodeFullscreen();
                this.questionTimer = new QuestionTimer();
                this.showSlide(this.loadSavedSlide(), { persist: false });
            }

            loadSavedSlide() {
                const saved = Number.parseInt(localStorage.getItem(this.slideKey), 10);
                if (Number.isNaN(saved)) return 0;
                return Math.max(0, Math.min(saved, this.slides.length - 1));
            }

            setupStageScale() {
                const scale = () => {
                    const factor = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
                    const x = (window.innerWidth - 1920 * factor) / 2;
                    const y = (window.innerHeight - 1080 * factor) / 2;
                    this.stage.style.transform = `translate(${x}px, ${y}px) scale(${factor})`;
                };
                scale();
                window.addEventListener("resize", scale);
            }

            setupKeyboardNav() {
                document.addEventListener("keydown", event => {
                    if (event.target && event.target.getAttribute("contenteditable") === "true") return;
                    if (["ArrowRight", "PageDown", " "].includes(event.key)) {
                        event.preventDefault();
                        this.next();
                    }
                    if (["ArrowLeft", "PageUp"].includes(event.key)) {
                        event.preventDefault();
                        this.prev();
                    }
                    if (event.key === "Home") this.showSlide(0);
                    if (event.key === "End") this.showSlide(this.slides.length - 1);
                });
            }

            setupTouchNav() {
                let startX = 0;
                let startY = 0;
                document.addEventListener("touchstart", event => {
                    startX = event.changedTouches[0].screenX;
                    startY = event.changedTouches[0].screenY;
                }, { passive: true });
                document.addEventListener("touchend", event => {
                    const dx = event.changedTouches[0].screenX - startX;
                    const dy = event.changedTouches[0].screenY - startY;
                    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
                        dx < 0 ? this.next() : this.prev();
                    }
                }, { passive: true });
            }

            setupWheelNav() {
                let last = 0;
                document.addEventListener("wheel", event => {
                    const now = Date.now();
                    if (now - last < 650) return;
                    last = now;
                    event.deltaY > 0 ? this.next() : this.prev();
                }, { passive: true });
            }

            setupButtons() {
                document.getElementById("prevBtn").addEventListener("click", () => this.prev());
                document.getElementById("nextBtn").addEventListener("click", () => this.next());
            }

            setupDeckFullscreen() {
                const button = document.getElementById("deckFullscreenBtn");
                button.addEventListener("click", async () => {
                    if (!document.fullscreenElement) {
                        await document.documentElement.requestFullscreen?.();
                        button.textContent = "退出";
                    } else {
                        await document.exitFullscreen?.();
                        button.textContent = "全屏";
                    }
                });
                document.addEventListener("fullscreenchange", () => {
                    button.textContent = document.fullscreenElement ? "退出" : "全屏";
                });
            }

            setupCodeFullscreen() {
                const overlay = document.getElementById("codeOverlay");
                const overlayBody = document.getElementById("codeOverlayBody");
                const overlayTitle = document.getElementById("codeOverlayTitle");
                const closeButton = document.getElementById("codeCloseBtn");
                const close = async () => {
                    overlay.classList.remove("open");
                    overlay.setAttribute("aria-hidden", "true");
                    overlayBody.innerHTML = "";
                    if (document.fullscreenElement === overlay) await document.exitFullscreen?.();
                };
                document.addEventListener("click", async event => {
                    const button = event.target.closest(".code-full-btn");
                    if (!button) return;
                    const codeId = button.getAttribute("data-code-id");
                    const body = document.querySelector(`[data-code-body="${codeId}"]`);
                    if (!body) return;
                    overlayTitle.textContent = document.querySelector(".slide.active h1")?.textContent || "程序代码";
                    overlayBody.innerHTML = body.innerHTML;
                    overlay.classList.add("open");
                    overlay.setAttribute("aria-hidden", "false");
                });
                closeButton.addEventListener("click", close);
                document.addEventListener("keydown", event => {
                    if (event.key === "Escape" && overlay.classList.contains("open")) {
                        close();
                    }
                    if (event.key === "Escape" && document.getElementById("answerOverlay").classList.contains("open")) {
                        closeAnswerOverlay();
                    }
                });
            }

            showSlide(index, options = {}) {
                const shouldPersist = options.persist !== false;
                this.currentSlide = Math.max(0, Math.min(index, this.slides.length - 1));
                this.slides.forEach((slide, i) => {
                    slide.classList.toggle("active", i === this.currentSlide);
                    slide.classList.toggle("visible", i === this.currentSlide);
                });
                this.counter.textContent = `${this.currentSlide + 1} / ${this.slides.length}`;
                this.questionTimer.sync(this.slides[this.currentSlide]);
                if (shouldPersist) {
                    localStorage.setItem(this.slideKey, String(this.currentSlide));
                }
            }

            next() { this.showSlide(this.currentSlide + 1); }
            prev() { this.showSlide(this.currentSlide - 1); }
        }

        /* ===========================================
           INLINE EDITING
           =========================================== */
        class InlineEditor {
            constructor() {
                this.isActive = false;
                this.key = "java-oop-review-course-slides-v26";
                this.toggle = document.getElementById("editToggle");
                this.load();
                this.setupToggle();
                this.setupSaving();
            }

            setupToggle() {
                const hotzone = document.querySelector(".edit-hotzone");
                let hideTimeout = null;
                this.toggle.addEventListener("click", () => this.toggleEditMode());
                hotzone.addEventListener("mouseenter", () => {
                    clearTimeout(hideTimeout);
                    this.toggle.classList.add("show");
                });
                hotzone.addEventListener("mouseleave", () => {
                    hideTimeout = setTimeout(() => {
                        if (!this.isActive) this.toggle.classList.remove("show");
                    }, 400);
                });
                this.toggle.addEventListener("mouseenter", () => clearTimeout(hideTimeout));
                this.toggle.addEventListener("mouseleave", () => {
                    hideTimeout = setTimeout(() => {
                        if (!this.isActive) this.toggle.classList.remove("show");
                    }, 400);
                });
                hotzone.addEventListener("click", () => this.toggleEditMode());
                document.addEventListener("keydown", event => {
                    if ((event.key === "e" || event.key === "E") && event.target.getAttribute("contenteditable") !== "true") {
                        this.toggleEditMode();
                    }
                    if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
                        event.preventDefault();
                        this.save();
                    }
                });
            }

            setupSaving() {
                document.addEventListener("input", event => {
                    if (event.target.getAttribute("contenteditable") === "true") this.save();
                });
            }

            toggleEditMode() {
                this.isActive = !this.isActive;
                document.body.classList.toggle("editing", this.isActive);
                this.toggle.classList.toggle("active", this.isActive);
                document.querySelectorAll("[data-editable='true']").forEach(el => {
                    el.setAttribute("contenteditable", this.isActive ? "true" : "false");
                });
            }

            save() {
                const data = Array.from(document.querySelectorAll("[data-editable='true']")).map(el => el.innerHTML);
                localStorage.setItem(this.key, JSON.stringify(data));
            }

            load() {
                const raw = localStorage.getItem(this.key);
                if (!raw) return;
                try {
                    const data = JSON.parse(raw);
                    document.querySelectorAll("[data-editable='true']").forEach((el, index) => {
                        if (data[index] !== undefined) el.innerHTML = data[index];
                    });
                } catch (error) {
                    console.warn("Could not load edits", error);
                }
            }
        }

        new SlidePresentation();
        new InlineEditor();
    </script>
</body>
</html>
